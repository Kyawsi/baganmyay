<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Bagan Myay</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Padauk&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Padauk',sans-serif;
            background: linear-gradient(135deg,#ff7a18,#ffb347);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .logo{
            width:90px;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="card">

    <img src="/images/logo.png" class="logo">

    <h3 class="fw-bold mb-3">ကျေးဇူးအများကြီးတင်ပါတယ်</h3>

    <p class="fs-5">
        Bagan Myay မိသားစုမှ သင်၏ လျှောက်လွှာကို လက်ခံရရှိပါပြီ။
    </p>

    <p class="fs-5">
        Bagan Myay မိသားစုမှ အထူးကျေးဇူးတင်ရှိပါသည်။
    </p>

    <a href="/" class="btn btn-warning mt-3">
        မူလစာမျက်နှာသို့ ပြန်သွားမည်
    </a>

</div>

</body>
</html>
